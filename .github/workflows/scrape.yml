name: Scrape Trustpilot Reviews
# v3 — Firecrawl-based, no Playwright

on:
  schedule:
    - cron: '0 6,12,18,0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape Trustpilot
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: node scripts/scrape.js

      - name: Commit updated data
        run: |
          git config user.email "scraper-bot@lebara-monitor"
          git config user.name "Lebara Monitor Bot"
          git add public/data/
          git diff --cached --quiet || git commit -m "chore: refresh review data [skip ci]"
          git push
