<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lebara — Sentiment Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-family: 'DM Sans', 'Inter', system-ui, sans-serif;
      background: #f4f2ee;
      color: #1a1a2e;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      display: flex;
      overflow: hidden;
      background-image:
        radial-gradient(ellipse 80% 50% at 5% 10%, hsla(330,60%,85%,0.20), transparent),
        radial-gradient(ellipse 60% 60% at 95% 90%, hsla(210,70%,85%,0.18), transparent),
        radial-gradient(ellipse 50% 45% at 50% 50%, hsla(45,30%,92%,0.25), transparent);
    }

    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; will-change: transform; }
    .orb-1 { width: 700px; height: 700px; background: radial-gradient(circle, hsla(330,60%,80%,0.10), transparent 70%); top: -15%; left: -10%; animation: float1 28s ease-in-out infinite; }
    .orb-2 { width: 600px; height: 600px; background: radial-gradient(circle, hsla(210,70%,80%,0.08), transparent 70%); bottom: -15%; right: -10%; animation: float2 34s ease-in-out infinite; }
    .orb-3 { width: 400px; height: 400px; background: radial-gradient(circle, hsla(50,50%,80%,0.07), transparent 70%); top: 35%; left: 45%; animation: float3 40s ease-in-out infinite; }

    @keyframes float1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(40px,30px) scale(1.04)} 66%{transform:translate(-25px,-40px) scale(0.96)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-30px,-40px) scale(1.03)} 66%{transform:translate(45px,20px) scale(0.97)} }
    @keyframes float3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(30px,-30px) scale(1.02)} }

    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideDown { from{opacity:0;max-height:0} to{opacity:1;max-height:800px} }
    @keyframes pulseGlow { 0%,100%{opacity:1} 50%{opacity:0.65} }
    @keyframes barGrow { from{width:0} to{width:var(--target-w)} }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.07); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.13); }
    input::placeholder { color: rgba(122,122,142,0.55); }

    @media (prefers-reduced-motion: reduce) {
      .orb, * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div id="root" style="position:relative;z-index:1;width:100%;display:flex;"></div>

<script type="text/babel">

// ── Design tokens ────────────────────────────────────────────────────────────

const DK = {
  bg: '#f4f2ee',
  surface: 'rgba(255,255,255,0.5)',
  card: 'rgba(255,255,255,0.45)',
  cardHover: 'rgba(255,255,255,0.65)',
  border: 'rgba(0,0,0,0.06)',
  borderHover: 'rgba(0,0,0,0.12)',
  text: '#1a1a2e',
  textSecondary: '#4a4a5a',
  textTertiary: '#7a7a8e',
  accent: '#0088cc',
};

const GLASS = {
  bg: 'rgba(255,255,255,0.40)',
  bgHover: 'rgba(255,255,255,0.65)',
  border: 'rgba(0,0,0,0.06)',
  borderHover: 'rgba(0,0,0,0.12)',
  blur: 'blur(20px)',
  transition: 'all 0.5s cubic-bezier(0.16,1,0.3,1)',
};

// Priority is INVERTED for reviews: low rating = high priority (needs attention)
const PRIORITY_COLORS = {
  high:   { color: '#3468a8', bg: 'rgba(52,104,168,0.08)', fg: '#2d5a90' },
  medium: { color: '#c4bfba', bg: 'rgba(196,191,186,0.05)', fg: '#9a958f' },
  low:    { color: '#d0ceca', bg: 'rgba(0,0,0,0.02)', fg: '#b0aca6' },
};

// Source accent colors
const SOURCE = {
  travel: { color: '#3468a8', bg: 'rgba(52,104,168,0.08)', border: 'rgba(52,104,168,0.20)', label: 'Travel eSIM' },
  mobile: { color: '#8a7060', bg: 'rgba(138,112,96,0.08)', border: 'rgba(138,112,96,0.20)', label: 'Mobile UK' },
};

const FONT = "'DM Sans','Inter',system-ui,sans-serif";
const FONT_DISPLAY = "'Space Grotesk','DM Sans',system-ui,sans-serif";

function ratingToPriority(rating) {
  if (rating <= 2) return 'high';
  if (rating === 3) return 'medium';
  return 'low';
}

function relativeDate(isoString) {
  if (!isoString) return '';
  const diff = Date.now() - new Date(isoString).getTime();
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 7) return `${days} days ago`;
  const weeks = Math.floor(days / 7);
  if (weeks < 5) return weeks === 1 ? '1 week ago' : `${weeks} weeks ago`;
  const months = Math.floor(days / 30);
  if (months < 13) return months === 1 ? '1 month ago' : `${months} months ago`;
  return `${Math.floor(days / 365)}y ago`;
}

function relativeMinutes(isoString) {
  if (!isoString) return '';
  const diff = Date.now() - new Date(isoString).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins === 1) return '1 min ago';
  if (mins < 60) return `${mins} min ago`;
  const hrs = Math.floor(mins / 60);
  return hrs === 1 ? '1 hour ago' : `${hrs} hours ago`;
}

// ── Hooks ────────────────────────────────────────────────────────────────────

function useSentimentData() {
  const [state, setState] = React.useState({ travel: null, mobile: null, loading: true, error: null });

  const load = React.useCallback(() => {
    setState(s => ({ ...s, loading: true, error: null }));
    Promise.all([
      fetch('/data/travel.json').then(r => { if (!r.ok) throw new Error('travel.json not found'); return r.json(); }),
      fetch('/data/mobile.json').then(r => { if (!r.ok) throw new Error('mobile.json not found'); return r.json(); }),
    ])
      .then(([travel, mobile]) => setState({ travel, mobile, loading: false, error: null }))
      .catch(err => setState(s => ({ ...s, loading: false, error: err.message })));
  }, []);

  React.useEffect(() => { load(); }, [load]);
  React.useEffect(() => {
    const id = setInterval(load, 15 * 60 * 1000);
    return () => clearInterval(id);
  }, [load]);

  return { ...state, refresh: load };
}

function useRelativeTime(isoString) {
  const [label, setLabel] = React.useState('');
  React.useEffect(() => {
    if (!isoString) return;
    const update = () => setLabel(relativeMinutes(isoString));
    update();
    const id = setInterval(update, 60000);
    return () => clearInterval(id);
  }, [isoString]);
  return label;
}

// ── Base components ──────────────────────────────────────────────────────────

function Icon({ name, size = 16, color, style = {} }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current) return;
    const el = document.createElement('i');
    el.setAttribute('data-lucide', name);
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    if (color) el.style.color = color;
    ref.current.innerHTML = '';
    ref.current.appendChild(el);
    lucide.createIcons({ nodes: [el] });
  }, [name, size, color]);
  return React.createElement('span', {
    ref, style: { display:'inline-flex',alignItems:'center',justifyContent:'center',width:size,height:size,flexShrink:0,lineHeight:0,...style }
  });
}

function NavItem({ icon, label, count, active, onClick }) {
  const [hov, setHov] = React.useState(false);
  return (
    <button onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} style={{
      position:'relative',display:'flex',alignItems:'center',gap:11,width:'100%',
      padding:'11px 16px',border:'none',borderRadius:'10px',
      background: active ? 'rgba(0,0,0,0.05)' : hov ? 'rgba(0,0,0,0.025)' : 'transparent',
      cursor:'pointer',fontFamily:FONT,fontSize:'15px',fontWeight: active ? 600 : 450,
      color: active ? DK.text : hov ? DK.textSecondary : DK.textTertiary,
      transition:'all 0.3s cubic-bezier(0.16,1,0.3,1)',textAlign:'left',overflow:'hidden',
    }}>
      {active && <div style={{position:'absolute',left:0,top:'20%',bottom:'20%',width:3,background:'#0088cc',borderRadius:'0 2px 2px 0'}}></div>}
      <Icon name={icon} size={18} color={active ? '#0088cc' : 'currentColor'} style={{opacity: active ? 1 : 0.5}} />
      <span style={{flex:1}}>{label}</span>
      {count != null && count > 0 && (
        <span style={{fontFamily:FONT,fontSize:'13px',fontWeight:600,color: active ? DK.textSecondary : DK.textTertiary,opacity:0.7}}>{count}</span>
      )}
    </button>
  );
}

// ── Star rating display ──────────────────────────────────────────────────────

function StarRating({ rating, size = 14 }) {
  return (
    <span style={{display:'inline-flex',gap:1,alignItems:'center'}}>
      {[1,2,3,4,5].map(i => (
        <svg key={i} width={size} height={size} viewBox="0 0 14 14" fill="none">
          <path d="M7 1.5l1.545 3.13 3.455.502-2.5 2.437.59 3.44L7 9.5l-3.09 1.509.59-3.44L2 5.132l3.455-.502L7 1.5z"
            fill={i <= rating ? '#c47a15' : 'rgba(0,0,0,0.10)'}
            stroke={i <= rating ? '#c47a15' : 'rgba(0,0,0,0.08)'}
            strokeWidth="0.5"
          />
        </svg>
      ))}
    </span>
  );
}

// ── Source pill ──────────────────────────────────────────────────────────────

function SourcePill({ source }) {
  const s = SOURCE[source] || SOURCE.travel;
  return (
    <span style={{
      fontFamily:FONT,fontSize:'12px',fontWeight:600,
      color:s.color,padding:'4px 10px',borderRadius:'6px',
      background:s.bg,border:`1px solid ${s.border}`,whiteSpace:'nowrap',
    }}>{s.label}</span>
  );
}

// ── Priority dot ─────────────────────────────────────────────────────────────

function PriorityLabel({ level }) {
  const c = PRIORITY_COLORS[level] || PRIORITY_COLORS.low;
  return (
    <span style={{fontFamily:FONT,fontSize:'12px',fontWeight:600,color:c.fg,display:'inline-flex',alignItems:'center',gap:6,whiteSpace:'nowrap'}}>
      <span style={{width:7,height:7,borderRadius:'50%',background:c.color,flexShrink:0}}></span>
      {level === 'high' ? 'Needs attention' : level === 'medium' ? 'Neutral' : 'Positive'}
    </span>
  );
}

// ── Stat card ────────────────────────────────────────────────────────────────

function StatCard({ label, value, sublabel, icon, accent }) {
  return (
    <div style={{
      padding:'24px 26px',
      background: accent ? `rgba(52,104,168,0.05)` : GLASS.bg,
      border:`1px solid ${accent ? 'rgba(52,104,168,0.18)' : GLASS.border}`,
      borderRadius:'16px',backdropFilter:GLASS.blur,WebkitBackdropFilter:GLASS.blur,
      flex:'1 1 0',minWidth:150,
      boxShadow: accent ? '0 4px 20px rgba(52,104,168,0.08)' : '0 2px 12px rgba(0,0,0,0.03)',
    }}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
        {icon && <Icon name={icon} size={16} color={DK.textTertiary} style={{opacity:0.6}} />}
        <span style={{fontFamily:FONT,fontSize:'12px',fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase',color:DK.textTertiary}}>{label}</span>
      </div>
      <div style={{fontFamily:FONT_DISPLAY,fontSize:'36px',fontWeight:600,color:DK.text,letterSpacing:'-0.03em',lineHeight:1}}>
        {value}
      </div>
      {sublabel && <div style={{fontFamily:FONT,fontSize:'13px',color:DK.textTertiary,marginTop:8}}>{sublabel}</div>}
    </div>
  );
}

// ── Review detail (expanded) ─────────────────────────────────────────────────

function ReviewDetail({ review }) {
  return (
    <div style={{
      padding:'20px 28px 24px',
      background:'rgba(0,0,0,0.015)',
      borderTop:`1px solid ${GLASS.border}`,
      animation:'slideDown 220ms cubic-bezier(0.16,1,0.3,1)',
    }}>
      <p style={{fontFamily:FONT,fontSize:'15px',lineHeight:1.7,color:DK.textSecondary,margin:'0 0 16px'}}>{review.body}</p>
      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
        <span style={{fontFamily:FONT,fontSize:'13px',color:DK.textTertiary}}>{review.author}</span>
        <span style={{color:DK.textTertiary,opacity:0.35,fontSize:'11px'}}>·</span>
        <StarRating rating={review.rating} size={13} />
        {review.url && (
          <>
            <span style={{color:DK.textTertiary,opacity:0.35,fontSize:'11px'}}>·</span>
            <a href={review.url} target="_blank" rel="noopener noreferrer"
              onClick={e => e.stopPropagation()}
              style={{fontFamily:FONT,fontSize:'13px',color:'#0088cc',textDecoration:'none',borderBottom:'1px solid rgba(0,136,204,0.3)'}}>
              View on Trustpilot
            </a>
          </>
        )}
      </div>
    </div>
  );
}

// ── Review card ──────────────────────────────────────────────────────────────

function ReviewCard({ review, index }) {
  const [expanded, setExpanded] = React.useState(false);
  const [hov, setHov] = React.useState(false);
  const priority = ratingToPriority(review.rating);
  const pc = PRIORITY_COLORS[priority];
  const headline = review.title || (review.body ? review.body.slice(0, 72) + '…' : 'Review');

  return (
    <div
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      onClick={() => setExpanded(!expanded)}
      style={{
        position:'relative',
        background: hov ? GLASS.bgHover : GLASS.bg,
        border:`1px solid ${hov ? GLASS.borderHover : GLASS.border}`,
        borderRadius:'16px',overflow:'hidden',
        backdropFilter:GLASS.blur,WebkitBackdropFilter:GLASS.blur,
        transition:GLASS.transition,cursor:'pointer',
        transform: hov ? 'translateY(-2px)' : 'translateY(0)',
        boxShadow: hov ? `0 8px 30px rgba(0,0,0,0.06),0 0 0 1px ${pc.color}12` : '0 2px 12px rgba(0,0,0,0.03)',
        animation:`fadeIn 300ms cubic-bezier(0.16,1,0.3,1) ${index * 25}ms both`,
      }}>
      <div style={{position:'absolute',top:0,left:0,right:0,height:'2px',background:`linear-gradient(to right,${pc.color}55,transparent 60%)`,opacity: hov ? 1 : 0.5,transition:'opacity 0.5s ease'}}></div>

      <div style={{padding:'20px 26px',display:'flex',alignItems:'flex-start',gap:16}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap',marginBottom:10}}>
            <PriorityLabel level={priority} />
            <span style={{color:DK.textTertiary,fontSize:'11px',opacity:0.35}}>·</span>
            <StarRating rating={review.rating} size={13} />
            <span style={{color:DK.textTertiary,fontSize:'11px',opacity:0.35}}>·</span>
            <SourcePill source={review.source} />
            <span style={{fontFamily:FONT,fontSize:'13px',color:DK.textTertiary,marginLeft:'auto',whiteSpace:'nowrap'}}>{relativeDate(review.date)}</span>
          </div>
          <div style={{fontFamily:FONT,fontSize:'16px',fontWeight:600,color:DK.text,lineHeight:1.45,letterSpacing:'-0.01em'}}>{headline}</div>
          {!expanded && review.body && (
            <p style={{fontFamily:FONT,fontSize:'14px',lineHeight:1.6,color:DK.textTertiary,margin:'7px 0 0',overflow:'hidden',textOverflow:'ellipsis',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{review.body}</p>
          )}
        </div>
        <div style={{flexShrink:0,width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',marginTop:4,transition:'transform 0.35s cubic-bezier(0.16,1,0.3,1)',transform: expanded ? 'rotate(180deg)' : 'none'}}>
          <Icon name="chevron-down" size={17} color={DK.textTertiary} />
        </div>
      </div>
      {expanded && <ReviewDetail review={review} />}
    </div>
  );
}

// ── Sentiment Span (hero visualization) ──────────────────────────────────────

function SentimentSpan({ travel, mobile }) {
  const tScore = travel ? travel.sentimentBreakdown.positive - travel.sentimentBreakdown.negative : null;
  const mScore = mobile ? mobile.sentimentBreakdown.positive - mobile.sentimentBreakdown.negative : null;

  // Map -100..+100 → 4%..96% (leave edge padding)
  const toX = (s) => 4 + ((s + 100) / 200) * 92;
  const tX = tScore != null ? toX(tScore) : null;
  const mX = mScore != null ? toX(mScore) : null;

  const delta = tScore != null && mScore != null ? Math.abs(Math.round(tScore - mScore)) : null;
  const leader = tScore != null && mScore != null ? (tScore > mScore ? 'Travel eSIM' : 'Mobile UK') : null;
  const midX = tX != null && mX != null ? (tX + mX) / 2 : null;

  return (
    <div style={{marginBottom:8}}>
      <div style={{fontFamily:FONT,fontSize:'12px',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:DK.textTertiary,marginBottom:24}}>Sentiment span</div>

      {/* Delta badge */}
      {delta != null && (
        <div style={{display:'flex',justifyContent:'center',marginBottom:6}}>
          <div style={{
            fontFamily:FONT,fontSize:'13px',fontWeight:600,color:DK.textSecondary,
            padding:'5px 14px',borderRadius:'20px',
            background:'rgba(255,255,255,0.7)',border:`1px solid ${GLASS.border}`,
            backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',
          }}>
            {leader} leads by {delta} pts
          </div>
        </div>
      )}

      {/* The axis */}
      <div style={{position:'relative',height:110,userSelect:'none'}}>

        {/* Gradient axis line */}
        <div style={{
          position:'absolute',top:'50%',left:'4%',right:'4%',height:3,
          transform:'translateY(-50%)',
          background:'linear-gradient(to right,rgba(180,60,60,0.25),rgba(180,60,60,0.08) 28%,rgba(0,0,0,0.05) 50%,rgba(52,104,168,0.08) 72%,rgba(52,104,168,0.25))',
          borderRadius:4,
        }}></div>

        {/* Zero tick */}
        <div style={{position:'absolute',top:'calc(50% - 6px)',left:'50%',width:1,height:12,background:'rgba(0,0,0,0.10)',transform:'translateX(-50%)'}}>
          <div style={{position:'absolute',top:15,left:'50%',transform:'translateX(-50%)',fontFamily:FONT,fontSize:'11px',color:DK.textTertiary,whiteSpace:'nowrap',opacity:0.6}}>0</div>
        </div>

        {/* Travel dot */}
        {tX != null && (
          <div style={{position:'absolute',top:'50%',left:`${tX}%`,transform:'translate(-50%,-50%)',zIndex:2}}>
            {/* Label above */}
            <div style={{position:'absolute',bottom:'calc(100% + 10px)',left:'50%',transform:'translateX(-50%)',textAlign:'center',whiteSpace:'nowrap'}}>
              <div style={{fontFamily:FONT,fontSize:'11px',fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:SOURCE.travel.color,marginBottom:2}}>Travel eSIM</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                <span style={{fontFamily:FONT_DISPLAY,fontSize:'18px',fontWeight:600,color:DK.text}}>{travel.avgRating.toFixed(1)}</span>
                <StarRating rating={Math.round(travel.avgRating)} size={12} />
              </div>
              <div style={{fontFamily:FONT,fontSize:'11px',color:DK.textTertiary}}>{travel.totalReviews.toLocaleString()} reviews</div>
            </div>
            {/* Dot */}
            <div style={{
              width:18,height:18,borderRadius:'50%',
              background:SOURCE.travel.color,
              border:'3px solid rgba(255,255,255,0.9)',
              boxShadow:`0 2px 12px ${SOURCE.travel.color}40,0 0 0 1px ${SOURCE.travel.color}30`,
            }}></div>
            {/* Score below */}
            <div style={{position:'absolute',top:'calc(100% + 10px)',left:'50%',transform:'translateX(-50%)',textAlign:'center',whiteSpace:'nowrap'}}>
              <div style={{fontFamily:FONT_DISPLAY,fontSize:'22px',fontWeight:700,color:SOURCE.travel.color,letterSpacing:'-0.02em'}}>{Math.round(tScore) > 0 ? '+' : ''}{Math.round(tScore)}</div>
              <div style={{fontFamily:FONT,fontSize:'11px',color:DK.textTertiary,marginTop:1}}>net score</div>
            </div>
          </div>
        )}

        {/* Mobile dot */}
        {mX != null && (
          <div style={{position:'absolute',top:'50%',left:`${mX}%`,transform:'translate(-50%,-50%)',zIndex:2}}>
            {/* Label above */}
            <div style={{position:'absolute',bottom:'calc(100% + 10px)',left:'50%',transform:'translateX(-50%)',textAlign:'center',whiteSpace:'nowrap'}}>
              <div style={{fontFamily:FONT,fontSize:'11px',fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:SOURCE.mobile.color,marginBottom:2}}>Mobile UK</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                <span style={{fontFamily:FONT_DISPLAY,fontSize:'18px',fontWeight:600,color:DK.text}}>{mobile.avgRating.toFixed(1)}</span>
                <StarRating rating={Math.round(mobile.avgRating)} size={12} />
              </div>
              <div style={{fontFamily:FONT,fontSize:'11px',color:DK.textTertiary}}>{mobile.totalReviews.toLocaleString()} reviews</div>
            </div>
            {/* Dot */}
            <div style={{
              width:18,height:18,borderRadius:'50%',
              background:SOURCE.mobile.color,
              border:'3px solid rgba(255,255,255,0.9)',
              boxShadow:`0 2px 12px ${SOURCE.mobile.color}40,0 0 0 1px ${SOURCE.mobile.color}30`,
            }}></div>
            {/* Score below */}
            <div style={{position:'absolute',top:'calc(100% + 10px)',left:'50%',transform:'translateX(-50%)',textAlign:'center',whiteSpace:'nowrap'}}>
              <div style={{fontFamily:FONT_DISPLAY,fontSize:'22px',fontWeight:700,color:SOURCE.mobile.color,letterSpacing:'-0.02em'}}>{Math.round(mScore) > 0 ? '+' : ''}{Math.round(mScore)}</div>
              <div style={{fontFamily:FONT,fontSize:'11px',color:DK.textTertiary,marginTop:1}}>net score</div>
            </div>
          </div>
        )}

        {/* Axis labels */}
        <div style={{position:'absolute',bottom:0,left:'4%',fontFamily:FONT,fontSize:'11px',color:DK.textTertiary,opacity:0.5}}>−100 negative</div>
        <div style={{position:'absolute',bottom:0,right:'4%',fontFamily:FONT,fontSize:'11px',color:DK.textTertiary,opacity:0.5}}>positive +100</div>
      </div>
    </div>
  );
}

// ── Mirror chart (rating breakdown) ─────────────────────────────────────────

function MirrorChart({ travel, mobile }) {
  const tRd = travel?.ratingBreakdown || {};
  const mRd = mobile?.ratingBreakdown || {};

  const allPcts = [5,4,3,2,1].flatMap(r => [tRd[r]||0, mRd[r]||0]);
  const maxPct = Math.max(...allPcts, 1);

  const starLabel = (n) => {
    const filled = '★'.repeat(n);
    const empty = '☆'.repeat(5 - n);
    return filled + empty;
  };

  return (
    <div style={{marginTop:32}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{width:10,height:10,borderRadius:2,background:SOURCE.travel.color}}></div>
          <span style={{fontFamily:FONT,fontSize:'12px',color:DK.textTertiary}}>Travel eSIM</span>
        </div>
        <div style={{fontFamily:FONT,fontSize:'12px',fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:DK.textTertiary}}>Rating breakdown</div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontFamily:FONT,fontSize:'12px',color:DK.textTertiary}}>Mobile UK</span>
          <div style={{width:10,height:10,borderRadius:2,background:SOURCE.mobile.color}}></div>
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {[5,4,3,2,1].map(star => {
          const tPct = tRd[star] || 0;
          const mPct = mRd[star] || 0;
          const tW = (tPct / maxPct) * 100;
          const mW = (mPct / maxPct) * 100;
          return (
            <div key={star} style={{display:'flex',alignItems:'center',gap:8}}>
              {/* Travel bar — extends left from center */}
              <div style={{flex:1,display:'flex',justifyContent:'flex-end',alignItems:'center',gap:4}}>
                <span style={{fontFamily:FONT,fontSize:'11px',color:DK.textTertiary,width:26,textAlign:'right',flexShrink:0}}>{tPct > 0 ? tPct+'%' : ''}</span>
                <div style={{flex:1,display:'flex',justifyContent:'flex-end'}}>
                  <div style={{
                    height:7,borderRadius:'3px 0 0 3px',
                    background:SOURCE.travel.color,
                    width: tW+'%',
                    transition:'width 0.9s cubic-bezier(0.16,1,0.3,1)',
                    opacity: tPct === 0 ? 0.15 : 1,
                    minWidth: tPct === 0 ? 2 : 0,
                  }}></div>
                </div>
              </div>

              {/* Star label */}
              <div style={{flexShrink:0,textAlign:'center',width:60,fontFamily:FONT,fontSize:'12px',color:'#c47a15',letterSpacing:-1}}>
                {starLabel(star)}
              </div>

              {/* Mobile bar — extends right from center */}
              <div style={{flex:1,display:'flex',alignItems:'center',gap:4}}>
                <div style={{
                  height:7,borderRadius:'0 3px 3px 0',
                  background:SOURCE.mobile.color,
                  width: mW+'%',
                  transition:'width 0.9s cubic-bezier(0.16,1,0.3,1)',
                  opacity: mPct === 0 ? 0.15 : 1,
                  minWidth: mPct === 0 ? 2 : 0,
                }}></div>
                <span style={{fontFamily:FONT,fontSize:'11px',color:DK.textTertiary,width:26,flexShrink:0}}>{mPct > 0 ? mPct+'%' : ''}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Top reviews list ─────────────────────────────────────────────────────────

function TopReviews({ reviews }) {
  const top = [...reviews]
    .filter(r => r.rating <= 2)
    .sort((a, b) => a.rating - b.rating || new Date(b.date) - new Date(a.date))
    .slice(0, 5);

  if (top.length === 0) return null;

  return (
    <div style={{marginTop:32,paddingTop:28,borderTop:`1px solid ${GLASS.border}`}}>
      <div style={{fontFamily:FONT,fontSize:'12px',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:DK.textTertiary,marginBottom:18}}>Needs attention</div>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {top.map(r => (
          <div key={r.id} style={{display:'flex',alignItems:'flex-start',gap:12}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:PRIORITY_COLORS.high.color,flexShrink:0,marginTop:6}}></div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:FONT,fontSize:'14px',fontWeight:600,color:DK.text,lineHeight:1.4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.title || r.body?.slice(0,60)+'…'}</div>
              <div style={{display:'flex',alignItems:'center',gap:6,marginTop:3}}>
                <SourcePill source={r.source} />
                <span style={{fontFamily:FONT,fontSize:'12px',color:DK.textTertiary}}>{relativeDate(r.date)}</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Overview panel ───────────────────────────────────────────────────────────

function SentimentOverview({ travel, mobile, reviews }) {
  return (
    <div style={{
      background:GLASS.bg,border:`1px solid ${GLASS.border}`,
      borderRadius:'20px',padding:'32px 36px',
      backdropFilter:GLASS.blur,WebkitBackdropFilter:GLASS.blur,
      boxShadow:'0 2px 20px rgba(0,0,0,0.04)',
      marginBottom:32,
      animation:'fadeIn 400ms cubic-bezier(0.16,1,0.3,1) both',
    }}>
      <SentimentSpan travel={travel} mobile={mobile} />
      <MirrorChart travel={travel} mobile={mobile} />
      <TopReviews reviews={reviews} />
    </div>
  );
}

// ── Loading skeleton ──────────────────────────────────────────────────────────

function LoadingSkeleton() {
  const shimmer = {
    background:'linear-gradient(90deg,rgba(0,0,0,0.04) 25%,rgba(0,0,0,0.07) 50%,rgba(0,0,0,0.04) 75%)',
    backgroundSize:'200% 100%',
    animation:'shimmer 1.5s infinite',
    borderRadius:8,
  };
  return (
    <div style={{animation:'fadeIn 300ms ease both'}}>
      <style>{`@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}`}</style>
      <div style={{...shimmer,height:200,marginBottom:20,borderRadius:16}}></div>
      {[0,1,2,3].map(i => (
        <div key={i} style={{...shimmer,height:80,marginBottom:12,borderRadius:14,opacity:1-i*0.15}}></div>
      ))}
    </div>
  );
}

// ── Error state ──────────────────────────────────────────────────────────────

function ErrorState({ message, onRetry }) {
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'80px 40px',textAlign:'center',animation:'fadeIn 300ms ease both'}}>
      <div style={{width:48,height:48,borderRadius:'50%',background:'rgba(0,0,0,0.04)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20}}>
        <Icon name="wifi-off" size={22} color={DK.textTertiary} />
      </div>
      <div style={{fontFamily:FONT,fontSize:'16px',fontWeight:600,color:DK.text,marginBottom:8}}>Could not load data</div>
      <div style={{fontFamily:FONT,fontSize:'14px',color:DK.textTertiary,marginBottom:24,maxWidth:320}}>{message || 'Check that the data files are in public/data/'}</div>
      <button onClick={onRetry} style={{
        fontFamily:FONT,fontSize:'14px',fontWeight:600,
        padding:'10px 24px',borderRadius:'10px',border:'none',
        background:'rgba(0,0,0,0.07)',color:DK.text,cursor:'pointer',
        transition:'background 0.2s ease',
      }}>Retry</button>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────

function App() {
  const { travel, mobile, loading, error, refresh } = useSentimentData();
  const [activeFilter, setActiveFilter] = React.useState('all');
  const [activeSource, setActiveSource] = React.useState('all');
  const [searchQuery, setSearchQuery] = React.useState('');

  // The latest fetchedAt across both sources
  const fetchedAt = travel?.fetchedAt || mobile?.fetchedAt || null;
  const updatedLabel = useRelativeTime(fetchedAt);

  const allReviews = React.useMemo(() => {
    const t = (travel?.reviews || []).map(r => ({ ...r, source: 'travel' }));
    const m = (mobile?.reviews || []).map(r => ({ ...r, source: 'mobile' }));
    return [...t, ...m];
  }, [travel, mobile]);

  const filteredReviews = React.useMemo(() => {
    let rs = [...allReviews];
    if (activeSource === 'travel') rs = rs.filter(r => r.source === 'travel');
    if (activeSource === 'mobile') rs = rs.filter(r => r.source === 'mobile');
    if (activeFilter === 'negative') rs = rs.filter(r => r.rating <= 2);
    else if (activeFilter === 'neutral') rs = rs.filter(r => r.rating === 3);
    else if (activeFilter === 'positive') rs = rs.filter(r => r.rating >= 4);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      rs = rs.filter(r =>
        r.title?.toLowerCase().includes(q) ||
        r.body?.toLowerCase().includes(q) ||
        r.author?.toLowerCase().includes(q)
      );
    }
    rs.sort((a, b) => a.rating - b.rating || new Date(b.date) - new Date(a.date));
    return rs;
  }, [allReviews, activeSource, activeFilter, searchQuery]);

  const counts = React.useMemo(() => ({
    all: allReviews.length,
    travel: allReviews.filter(r => r.source === 'travel').length,
    mobile: allReviews.filter(r => r.source === 'mobile').length,
    negative: allReviews.filter(r => r.rating <= 2).length,
    neutral: allReviews.filter(r => r.rating === 3).length,
    positive: allReviews.filter(r => r.rating >= 4).length,
  }), [allReviews]);

  const stats = React.useMemo(() => ({
    travelAvg: travel?.avgRating ?? null,
    mobileAvg: mobile?.avgRating ?? null,
    negative: counts.negative,
    total: counts.all,
  }), [travel, mobile, counts]);

  const showOverview = activeSource === 'all' && activeFilter === 'all' && !searchQuery;

  return (
    <div style={{display:'flex',width:'100%',minHeight:'100vh'}}>

      {/* ── Sidebar ── */}
      <aside style={{
        width:272,flexShrink:0,
        background:'rgba(255,255,255,0.55)',
        backdropFilter:'blur(32px)',WebkitBackdropFilter:'blur(32px)',
        borderRight:'1px solid rgba(0,0,0,0.06)',
        display:'flex',flexDirection:'column',
        position:'sticky',top:0,height:'100vh',overflow:'auto',
      }}>
        {/* Logo */}
        <div style={{padding:'30px 26px 24px',borderBottom:'1px solid rgba(0,0,0,0.05)'}}>
          <div style={{display:'flex',alignItems:'center',gap:13}}>
            <div style={{
              width:38,height:38,borderRadius:'10px',
              background:'linear-gradient(135deg,rgba(52,104,168,0.12),rgba(138,112,96,0.12))',
              border:'1px solid rgba(0,0,0,0.06)',
              display:'flex',alignItems:'center',justifyContent:'center',
              transform:'rotate(3deg)',flexShrink:0,
            }}>
              <div style={{width:8,height:8,borderRadius:'50%',background:'#1a1a2e',opacity:0.35}}></div>
            </div>
            <div>
              <div style={{fontFamily:FONT_DISPLAY,fontSize:'17px',fontWeight:600,color:DK.text,letterSpacing:'-0.02em',marginBottom:1}}>Lebara Sentiment</div>
              <div style={{fontFamily:FONT,fontSize:'12px',fontWeight:500,letterSpacing:'0.05em',textTransform:'uppercase',color:DK.textTertiary}}>Trustpilot monitor</div>
            </div>
          </div>
        </div>

        {/* Nav */}
        <nav style={{padding:'14px 12px',display:'flex',flexDirection:'column',gap:2,flex:1}}>
          <NavItem icon="inbox" label="All reviews" count={counts.all}
            active={activeSource === 'all' && activeFilter === 'all'}
            onClick={() => { setActiveSource('all'); setActiveFilter('all'); }} />

          <div style={{fontFamily:FONT,fontSize:'11px',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:DK.textTertiary,padding:'22px 16px 8px',opacity:0.6}}>Source</div>

          <NavItem icon="globe" label="Lebara Travel eSIM" count={counts.travel}
            active={activeSource === 'travel'}
            onClick={() => { setActiveSource('travel'); setActiveFilter('all'); }} />
          <NavItem icon="smartphone" label="Lebara Mobile UK" count={counts.mobile}
            active={activeSource === 'mobile'}
            onClick={() => { setActiveSource('mobile'); setActiveFilter('all'); }} />

          <div style={{fontFamily:FONT,fontSize:'11px',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:DK.textTertiary,padding:'22px 16px 8px',opacity:0.6}}>Rating</div>

          <NavItem icon="alert-circle" label="Negative  1–2★" count={counts.negative}
            active={activeFilter === 'negative'}
            onClick={() => { setActiveFilter('negative'); setActiveSource('all'); }} />
          <NavItem icon="minus-circle" label="Neutral  3★" count={counts.neutral}
            active={activeFilter === 'neutral'}
            onClick={() => { setActiveFilter('neutral'); setActiveSource('all'); }} />
          <NavItem icon="check-circle" label="Positive  4–5★" count={counts.positive}
            active={activeFilter === 'positive'}
            onClick={() => { setActiveFilter('positive'); setActiveSource('all'); }} />
        </nav>

        {/* Updated indicator */}
        <div style={{padding:'20px 26px',borderTop:'1px solid rgba(0,0,0,0.05)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:'#22a867',animation:'pulseGlow 3s ease-in-out infinite',flexShrink:0}}></div>
            <div>
              <div style={{fontFamily:FONT,fontSize:'13px',fontWeight:500,color:DK.text}}>Hourly scrape</div>
              {updatedLabel && <div style={{fontFamily:FONT,fontSize:'12px',color:DK.textTertiary,marginTop:1}}>Updated {updatedLabel}</div>}
            </div>
            <button onClick={refresh} title="Refresh data" style={{
              marginLeft:'auto',width:28,height:28,borderRadius:'8px',border:'none',
              background:'rgba(0,0,0,0.04)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
              flexShrink:0,transition:'background 0.2s ease',
            }}
            onMouseEnter={e => e.currentTarget.style.background='rgba(0,0,0,0.08)'}
            onMouseLeave={e => e.currentTarget.style.background='rgba(0,0,0,0.04)'}
            >
              <Icon name="refresh-cw" size={13} color={DK.textTertiary} />
            </button>
          </div>
        </div>
      </aside>

      {/* ── Main ── */}
      <main style={{flex:1,padding:'40px 48px',maxWidth:1040,overflow:'auto',height:'100vh'}}>

        {/* Header */}
        <div style={{marginBottom:32,display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
          <div>
            <div style={{fontFamily:FONT,fontSize:'12px',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:DK.textTertiary,marginBottom:8}}>
              {activeSource === 'all' && activeFilter === 'all' ? 'Overview' :
               activeSource === 'travel' ? 'Lebara Travel eSIM' :
               activeSource === 'mobile' ? 'Lebara Mobile UK' :
               activeFilter === 'negative' ? 'Negative reviews' :
               activeFilter === 'neutral' ? 'Neutral reviews' : 'Positive reviews'}
            </div>
            <h1 style={{fontFamily:FONT_DISPLAY,fontSize:'28px',fontWeight:600,color:DK.text,letterSpacing:'-0.02em',lineHeight:1}}>
              Sentiment Monitor
            </h1>
          </div>

        </div>

        {/* Stat cards */}
        {!loading && !error && (
          <div style={{display:'flex',gap:14,marginBottom:28,flexWrap:'wrap'}}>
            <StatCard label="Travel eSIM" icon="globe"
              value={stats.travelAvg != null ? stats.travelAvg.toFixed(1) + '★' : '—'}
              sublabel={travel ? `${travel.totalReviews.toLocaleString()} total reviews` : 'No data'} />
            <StatCard label="Mobile UK" icon="smartphone"
              value={stats.mobileAvg != null ? stats.mobileAvg.toFixed(1) + '★' : '—'}
              sublabel={mobile ? `${mobile.totalReviews.toLocaleString()} total reviews` : 'No data'} />
            <StatCard label="Needs attention" icon="alert-circle"
              value={stats.negative}
              sublabel="1–2★ reviews loaded" />
            <StatCard label="Reviews" icon="message-square"
              value={stats.total}
              sublabel={`${counts.positive} positive · ${counts.negative} negative`} />
          </div>
        )}

        {/* Content */}
        {loading && <LoadingSkeleton />}
        {!loading && error && <ErrorState message={error} onRetry={refresh} />}

        {!loading && !error && (
          <>
            {/* Overview panel — only when not filtered */}
            {showOverview && <SentimentOverview travel={travel} mobile={mobile} reviews={allReviews} />}

            {/* Review feed */}
            {filteredReviews.length === 0 ? (
              <div style={{textAlign:'center',padding:'60px 20px',color:DK.textTertiary,fontFamily:FONT,fontSize:'15px'}}>
                No reviews match your filter.
              </div>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {filteredReviews.map((r, i) => (
                  <ReviewCard key={r.id} review={r} index={i} />
                ))}
              </div>
            )}
          </>
        )}

      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
